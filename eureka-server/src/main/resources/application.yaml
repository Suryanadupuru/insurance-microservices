server:
  port: 8761

spring:
  application:
    name: eureka-server
  security:
    user:
      name: ${EUREKA_USERNAME:root}
      password: ${EUREKA_PASSWORD:root}

eureka:
  instance:
    hostname: ${EUREKA_HOSTNAME:localhost}
    prefer-ip-address: false
  client:
    # This is the server — it should NOT register itself or fetch registry
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${spring.security.user.name}:${spring.security.user.password}@${eureka.instance.hostname}:${server.port}/eureka/
  server:
    # Wait time in ms before evicting unresponsive instances
    eviction-interval-timer-in-ms: 10000
    # Disables self-preservation in dev; enables it in production
    enable-self-preservation: ${EUREKA_SELF_PRESERVATION:false}
    # Threshold for self-preservation mode
    renewal-percent-threshold: 0.85
    # Response cache update interval
    response-cache-update-interval-ms: 3000

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, env
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

# Application info shown in Actuator /info
info:
  app:
    name: Insurance Eureka Server
    description: Service Registry for Insurance Microservices
    version: 1.0.0
    environment: ${SPRING_PROFILES_ACTIVE:development}

logging:
  level:
    com.insurance.eureka: DEBUG
    com.netflix.eureka: INFO
    com.netflix.discovery: INFO
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/eureka-server.log
