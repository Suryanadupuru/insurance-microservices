version: '3.8'

# ═══════════════════════════════════════════════════════════════
# Insurance Microservices — Docker Compose
# Services are added progressively as they are built.
# Currently active: eureka-server
# ═══════════════════════════════════════════════════════════════

networks:
  insurance-network:
    driver: bridge
    name: insurance-network

volumes:
  eureka-logs:
  mysql-config-data:
  mysql-user-data:
  mysql-policy-data:
  mysql-claims-data:
  mysql-application-data:
  mysql-renewal-data:
  mysql-quote-data:
  mysql-support-data:
  mysql-analytics-data:
  mysql-notification-data:

services:

  # ─────────────────────────────────────────────────────────────
  # INFRASTRUCTURE: Eureka Service Discovery
  # ─────────────────────────────────────────────────────────────
  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_USERNAME=eureka-admin
      - EUREKA_PASSWORD=eureka-password
      - EUREKA_HOSTNAME=eureka-server
      - EUREKA_SELF_PRESERVATION=true
    volumes:
      - eureka-logs:/app/logs
    networks:
      - insurance-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

